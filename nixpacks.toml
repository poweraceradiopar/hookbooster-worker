# nixpacks.toml
[build]
packages = [
  "ffmpeg",         # for video processing
  "python3",        # yt-dlp dependency
  "bash",           # shell support
  "coreutils",      # safe filesystem commands
  "yt-dlp"          # YouTube downloader
]

[environment]
# folder for outputs
OUTPUT_DIR="./outputs"

[commands]
# create outputs folder
"mkdir -p $OUTPUT_DIR"
